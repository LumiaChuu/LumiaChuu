<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Pacman -->
  <g>
    <circle cx="50" cy="50" r="40" fill="#FFFF00">
      <animate attributeName="r" values="40;38;40" dur="0.5s" repeatCount="indefinite" />
    </circle>
    <path d="M50 10 L90 50 L50 90 L50 10" fill="#000">
      <animate attributeName="d" values="M50 10 L90 50 L50 90 L50 10;M50 10 L50 50 L50 90 L50 10;M50 10 L90 50 L50 90 L50 10" dur="0.5s" repeatCount="indefinite" />
    </path>
    <!-- Eye -->
    <circle cx="50" cy="30" r="5" fill="#000" />
  </g>
</svg>